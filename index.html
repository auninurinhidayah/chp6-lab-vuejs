<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Vue Lab - Profile Card</title>

	<style>
 		body { font-family: system-ui, sans-serif; background: #F5F7FA;
 		margin: 0; padding: 2rem; transition: background .3s; }

 		#app { max-width: 420px; margin: 0 auto; }

 		.card {
 			background: #FFFFFF; border-radius: 16px; padding: 2rem;
 			box-shadow: 0 8px 24px rgba(0,0,0,.08); text-align: center;
 			transition: background .3s, color .3s;
 		}

 		.avatar { width: 120px; height: 120px; border-radius: 50%;
 		border: 4px solid #42B883; }

 		.title { color: #42B883; font-weight: 600; margin: .25rem 0 1rem; }

 		.bio { color: #64748B; font-size: .95rem; }

 		/* Dark theme */
 		.dark { }
 		.dark .card { background: #1E293B; color: #F1F5F9; }
 		
 		body.dark { background: #0F172A; }
 		.dark .bio { color: #94A3B8; }

 		.editor {
 			background: #FFFFFF; padding: 1.5rem; border-radius: 16px;
 			margin-top: 1rem; box-shadow: 0 4px 12px rgba(0,0,0,.06);
		}

		.editor h3 { margin-top: 0; color: #35495E; }

		.editor label { display: block; margin: .75rem 0; font-size: .9rem; }

		.editor input[type=text], .editor textarea {
			width: 100%; padding: .5rem; border: 1px solid #CBD5E1;
 			border-radius: 6px; font-size: 1rem; margin-top: .25rem;
		}

		.dark .editor { background: #1E293B; color: #F1F5F9; }

		.skills { list-style: none; padding: 0; margin: 1rem 0 0; }
		.skills li {
 			display: inline-flex; align-items: center;
 			background: #ECFDF5; color: #065F46; padding: .3rem .7rem;
 			border-radius: 999px; margin: .25rem; font-size: .85rem;
		}

		.skills li button {
 			background: none; border: none; color: #065F46;
 			margin-left: .5rem; cursor: pointer; font-size: 1rem;
		}

		.btn {
 			background: #42B883; color: white; border: none;
 			padding: .6rem 1rem; border-radius: 6px; cursor: pointer;
 			font-weight: 600;
		}

		.btn:hover { background: #33A06F; }

		.btn:disabled { 
			background: #94a3b8;
			cursor: not-allowed;
		}

		.dark .skills li { background: #064E3B; color: #6EE7B7; }

		.muted { color: #94A3B8; font-size: .85rem; margin-top: .75rem; }
	</style>

</head>

<body>
	<h1> 
		<div id="app" :class="{ dark : darkMode }">
			<section class="card">
				<img :src="avatar" :alt="name" class="avatar">
				<h2>{{ name }}</h2>
				<p class ="title">{{ title }}</p>
				<p class ="bio">{{ bio }}</p>

				<ul class="skills">
 					<li v-for="(skill, i) in skills" :key="skill">{{ skill }}
 					<button @click="removeSkill(i)" title="Remove">&times;</button>
					</li>
				</ul>

				<p v-if="skillCount === 0" class="muted">
					No skills yet — add your first skill to get started.
				</p>

				<p v-else class="muted">
 					Listed <strong>{{ skillCount }}</strong>
 					skill<span v-if="skillCount !== 1">s</span>.
				</p>


			</section>

			<section class="editor">
 				<h3>Edit Profile</h3>

 				<label>Name:
 					<input v-model="name" type="text">
 				</label>

 				<label>Title:
 					<input v-model="title" type="text">
 				</label>

 				<label>Bio:
 					<textarea v-model="bio" rows="3"></textarea>
 				</label>

 				<label>
 					<input type="checkbox" v-model="darkMode"> Dark mode
 				</label>

 				<label>Add a skill:
 					<input v-model="newSkill"
 						@keyup.enter="addSkill"
 						placeholder="e.g. Node.js">
				</label>

				<label>Change Avatar:
    				<input type="file" @change="handleFileUpload" accept="image/*">
				</label>

				<button class="btn" :disabled="!newSkill.trim()" @click="addSkill">
    				+ Add skill
				</button>
			</section>
		</div>
	</h1>

	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

	<script>
 		const { createApp, ref, computed, watch} = Vue

 		createApp({
 			setup() {
 				const name = ref('Auni Nurin Hidayah')
 				const title = ref('Full-Stack Developer')
 				const bio = ref('Loves Vue, milk tea, and open-source')
 				const avatar = ref('images/profile.png')
 				const darkMode = ref(false)
 				const skills = ref(['Vue.js', 'JavaScript', 'HTML & CSS'])
				const newSkill = ref('')
				const skillCount = computed(() => skills.value.length)

				watch(darkMode, on=> document.body.classList.toggle('dark', on), {immediate: true})

    			watch(name, (n,o) => console.log(o, "->", n))

    			const saved- JSON.parse(localStorage.getItem('profile') || 'null')
    				if(saved){
    					name.value = saved.name ??name.value
    					bio.value = saved.bio ??bio.value
    					skills.value = saved.skills ??skills.value
    				}

    			watch (
    				()=> ({name: name.value, bio: bio.value, skills: skills.value}),
    				(profile)=> localStorage.setItem('profile', JSON.stringify(profile)), {deep: true}
    			)

				function addSkill() {
 					const s = newSkill.value.trim()
 					if (!s) return
 					if (!skills.value.includes(s)) {
 						skills.value.push(s)
 					}
 					newSkill.value = ''
				}

				function removeSkill(index) {
 					skills.value.splice(index, 1)
				}

				function onAvatarChange(e){
					const file = e.target.files?.[0]
						if (!file) return const reader = new FileReader()
					reader.onload =() =>{ avatar.value = reader.result }// data: URL
					reader.readAsDataURL(file)
				}

				return {
 					name, title, bio, avatar, darkMode,
 					skills, newSkill, addSkill, removeSkill, skillCount, onAvatarChange
				}
 			}
 		}).mount('#app')
	</script>

</body>

</html>
